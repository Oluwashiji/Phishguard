services:
  # ── Backend (Flask API) ──────────────────────────────────────────────────────
  - type: web
    name: phishguard-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --bind 0.0.0.0:$PORT --timeout 180
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: FLASK_ENV
        value: production

  # ── Frontend (React/Vite Static Site) ───────────────────────────────────────
  - type: web
    name: phishguard-app
    runtime: static
    rootDir: app
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://phishguard-api.onrender.com/api   # update after backend deploys
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
